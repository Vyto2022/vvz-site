<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanks | VVZ Studio</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <style>
    :root{--bg:#0b0b0f;--line:#26263a;--t:#e9e9f2;--m:#b9b9cd;--a1:#00b2ff;--a2:#7a2cff;--r:18px;--max:900px}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--t)}
    .c{max-width:var(--max);margin:0 auto;padding:48px 20px}
    .card{background:rgba(17,17,26,.75);border:1px solid rgba(38,38,58,.9);border-radius:var(--r);padding:22px}
    h1{margin:0 0 10px;font-size:34px} p{margin:0;color:var(--m);line-height:1.6}
    .btn{display:inline-block;margin-top:16px;padding:10px 14px;border-radius:999px;border:1px solid rgba(38,38,58,.9);background:rgba(17,17,26,.6);font-weight:800;font-size:14px;color:inherit;text-decoration:none}
    .btnP{border:none;background:linear-gradient(135deg,var(--a1),var(--a2));color:#081018}
  </style>
</head>
<body>
  <main class="c">
    <div class="card">
      <h1>✅ Message sent</h1>
      <p>Thanks! I got your request. I’ll reply as soon as possible.</p>
      <a class="btn" href="index.html">← Back to site</a>
      <a class="btn btnP" href="index.html#work" style="margin-left:10px">View work</a>
    </div>
  </main>
</body>
</html>
